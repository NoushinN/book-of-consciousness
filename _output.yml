bookdown::gitbook:
  css: style.css
  split_by: chapter
  config:
    toc:
      before: |
        <li><a href="./">Theories of Consciousness</a></li>
      after: |
        <li><a href="https://bookdown.org" target="blank">Published with bookdown</a></li>
    edit: null
    download: ["pdf", "epub"]
    sharing:
      github: true
      facebook: false
      twitter: false

bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: true

bookdown::epub_book: default
